<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bingo Duel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Top Navigation -->
      <header class="top-nav">
        <div class="logo">BINGO DUEL</div>
        <div class="nav-badges">
          <span class="badge" id="connStatus">Offline</span>
          <span class="badge" id="roomBadge">Room: <span class="highlight" id="roomCode">----</span></span>
          <span class="badge" id="youBadge">You: <span class="highlight" id="youName">-</span></span>
          <span class="badge is-hidden" id="readyChip">Not ready</span>
          
          <div class="audio-controls is-hidden" id="audioControls">
            <button class="btn btn-icon" id="muteMicBtn" title="Mute Microphone" aria-label="Mute Microphone">
              <!-- Mic icon -->
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-on"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <button class="btn btn-icon" id="deafenBtn" title="Mute Opponent Voice" aria-label="Deafen Voice">
              <!-- Headphone icon -->
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-on"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
            </button>
          </div>
          
          <button class="btn btn-icon" id="muteGameBtn" title="Toggle Game Sounds" aria-label="Toggle Game Sounds">
            <!-- Music icon -->
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-on"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
          </button>
          
          <button class="btn btn-leave is-hidden" id="disconnectBtn">Leave</button>
        </div>
      </header>
      
      <!-- Invisible audio element for WebRTC voice -->
      <audio id="remoteAudio" autoplay></audio>

      <!-- Lobby -->
      <section class="lobby" id="lobby">
        <div class="glass-card lobby-card">
          <h2>Enter the Arena</h2>
          <div class="form-row">
            <input id="nameInput" type="text" placeholder="Enter display name" required />
          </div>
          
          <div class="lobby-divider"></div>
          
          <div class="lobby-actions">
            <div class="lobby-action-box">
              <h3>Create Game</h3>
              <button class="btn btn-primary btn-full" id="createRoomBtn">Create Room</button>
            </div>
            
            <div class="lobby-action-box">
              <h3>Join Game</h3>
              <div class="join-row">
                <input id="roomInput" type="text" placeholder="Room code" />
                <button class="btn btn-secondary" id="joinRoomBtn">Join</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Main Game Area -->
      <main class="game-area is-hidden" id="game">
        
        <!-- Left Column: Your Area -->
        <div class="player-panel">
          <div class="panel-header">
            <div class="glass-badge turn-badge" id="turnIndicator">Waiting</div>
            <div class="glass-badge line-badge">
              <span class="muted">Lines:</span>
              <span class="highlight"><span id="youLines">0</span>/5</span>
            </div>
          </div>
          
          <div class="hero-board">
            <div class="bingo-letters" id="bingoLetters">
              <span class="bingo-letter" id="letter-B">B</span>
              <span class="bingo-letter" id="letter-I">I</span>
              <span class="bingo-letter" id="letter-N">N</span>
              <span class="bingo-letter" id="letter-G">G</span>
              <span class="bingo-letter" id="letter-O">O</span>
            </div>
            <div class="board" id="playerBoard"></div>
          </div>
        </div>

        <!-- Right Column: Opponent Area -->
        <div class="player-panel opp-panel" id="oppBoardWrap">
          <div class="panel-header">
            <div class="glass-badge opp-badge" id="opponentInfo">
              <span class="muted">Opponent:</span>
              <span class="highlight opp-name" id="oppName">Waiting...</span>
              <span id="oppStatus" class="status-indicator"></span>
            </div>
            <div class="glass-badge line-badge">
              <span class="muted">Lines:</span>
              <span class="highlight"><span id="oppLines">0</span>/5</span>
            </div>
          </div>
          
          <div class="hero-board">
            <div class="bingo-letters" id="oppBingoLetters">
              <span class="bingo-letter" id="opp-letter-B">B</span>
              <span class="bingo-letter" id="opp-letter-I">I</span>
              <span class="bingo-letter" id="opp-letter-N">N</span>
              <span class="bingo-letter" id="opp-letter-G">G</span>
              <span class="bingo-letter" id="opp-letter-O">O</span>
            </div>
            <div class="board opp-board" id="oppBoard"></div>
          </div>
        </div>

      </main>

      <!-- Bottom Action Area -->
      <footer class="bottom-action-area is-hidden" id="actionArea">
        <div class="turn-timer-wrap" id="turnTimerWrap">
            <div class="timer-bar is-hidden" id="timerBar">
                <div class="timer-bar-fill" id="timerBarFill"></div>
            </div>
        </div>
        
        <div class="action-content">
          <div class="layouts-wrapper" id="layoutRow">
            <span class="layouts-label">Presets:</span>
            <div class="layout-list" id="layoutList"></div>
            <button class="btn btn-ghost btn-tiny" id="clearLayoutBtn">Clear Board</button>
            <button class="btn btn-ghost btn-tiny is-hidden" id="saveLayoutBtn">Save Layout</button>
          </div>
          
          <div class="next-action">
            <div class="next-number-badge">
              <span class="muted">Next:</span>
              <span class="highlight" id="nextNumber">1</span>
            </div>
            <button class="btn btn-primary btn-large" id="readyBtn" disabled>READY</button>
          </div>
        </div>
      </footer>

      <div class="toast is-hidden" id="toast"></div>

      <div class="overlay is-hidden" id="winnerOverlay">
        <div class="glass-card text-center">
          <div class="overlay-title" id="winnerTitle">Winner!</div>
          <div class="overlay-sub" id="winnerSub">Game over</div>
          <button class="btn btn-primary" id="playAgainBtn">Play again</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
